name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm install
        run: npm install

      - name: lint + build
        run: npm run ci

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: php lint
        run: |
          php -l woocommerce-side-cart.php
          php -l woocommerce-side-cart.config.php
          find includes -name "*.php" -print0 | xargs -0 -n1 php -l
          find templates -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: bash syntax check
        run: |
          bash -n scripts/wp-setup.sh
          bash -n scripts/smoke-storeapi-cart.sh
